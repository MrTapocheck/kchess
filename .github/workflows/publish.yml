name: Build and Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            name: kchess-win-x64
          - rid: linux-x64
            name: kchess-linux-x64
          - rid: linux-arm64
            name: kchess-linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install .NET 10 Preview
        run: |
          wget https://dot.net/v1/dotnet-install.sh -O dotnet-install.sh
          chmod +x dotnet-install.sh
          # Устанавливаем канал preview
          ./dotnet-install.sh --channel 10.0 --quality preview
          # Добавляем в путь системы
          export DOTNET_ROOT=$HOME/.dotnet
          export PATH=$PATH:$DOTNET_ROOT:$DOTNET_ROOT/tools
          # Проверяем версию
          dotnet --version

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish ${{ matrix.name }}
        run: |
          dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish/${{ matrix.name }}

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Create Zip Archives
        run: |
          cd ./publish
          zip -r ${{ matrix.name }}.zip ${{ matrix.name }}

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ./publish/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}