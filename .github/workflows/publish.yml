name: Build and Release

on:
  push:
    branches:
      - main      # Запускать сборку при каждом коммите
    tags:
      - 'v*'     # Запускать сборку + релиз при создании тега
    workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - rid: win-x64
            name: kchess-win-x64
          - rid: linux-x64
            name: kchess-linux-x64
          - rid: linux-arm64
            name: kchess-linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish ${{ matrix.name }}
        run: |
          dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish/${{ matrix.name }}

      - name: Create Zip Archives
        run: |
          cd ./publish
          zip -r ${{ matrix.name }}.zip ${{ matrix.name }}

      # выполнится только если пуш был сделан по тегу (refs/tags/)
      - name: Upload to Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ./publish/*.zip
          # Если тега нет, этот шаг просто пропускается
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}