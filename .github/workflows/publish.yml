name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch: # отчаяно запускать вручную для тестов

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - rid: win-x64
            name: kchess-win-x64
          - rid: linux-x64
            name: kchess-linux-x64
          - rid: linux-arm64
            name: kchess-linux-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish ${{ matrix.name }}
        run: |
          dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -o ./publish/${{ matrix.name }}

      # УСТАНОВКА ZIP 
      - name: Install zip utility
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Create Zip Archives
        run: |
          cd ./publish
          echo "Files in publish folder:"
          ls -R
          echo "Creating archive for ${{ matrix.name }}"
          zip -r ${{ matrix.name }}.zip ${{ matrix.name }}
          ls -l *.zip

      # ПРОВЕРКА: Загружаем только если это ТЕГ
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ./publish/*.zip
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}